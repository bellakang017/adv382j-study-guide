const HL = {
  gold: { color: "#B4975A", fontWeight: 700 },   // theories/models
  blue: { color: "#2B6CB0", fontWeight: 600 },    // scholars
  red:  { color: "#8B2332", fontWeight: 600 },    // traps/warnings
  green:{ color: "#2E6B50", fontWeight: 600 },    // exam tips
};

const hlRules = [
  // Theories & Models (gold bold)
  { pattern: /\b(EPPM|Extended Parallel Process Model|Transportation Theory|ELM|Elaboration Likelihood Model|Prospect Theory|Communication Accommodation Theory|CAT|Inoculation Theory)\b/g, style: HL.gold },
  { pattern: /\b(Internalization|Compliance|Identification|Danger control|Fear control|Global reflection|Transportation)\b/g, style: HL.gold },
  { pattern: /\b(Response efficacy|Self-efficacy|Severity|Susceptibility)\b/g, style: HL.gold },
  { pattern: /\b(PROCESS Model [467]|Model [467])\b/g, style: HL.gold },

  // Scholar names (blue)
  { pattern: /\b(Witte|Kim Witte|Green & Brock|Hamby & Brinberg|H&B|Milgram|Kelman|Kahneman & Tversky|Baumrind|Burger|Graesser, Singer, & Trabasso|Schwarz & Clore|Fritz & MacKinnon|Petty & Cacioppo|Dr\. Oh)\b/g, style: HL.blue },

  // Traps & Warnings (red)
  { pattern: /(Fear control sounds positive but[^.]*FAILURE|[Nn]on-refutational two-sided can BACKFIRE|BACKFIRE|NAMING TRAP|TRAP:|fear control = [^.]*FAILURE|persuasion FAILURE|message REJECTION|Fear control = managing the EMOTION[^.]*message = FAILURE)/g, style: HL.red },
  { pattern: /\b(NOT a component|NOT a psychological|NOT equal|NOT statistically significant|NOT a static trait|does NOT equal|does NOT refute|does NOT include|NOT mediator|NOT the emotion|NOT the message)\b/g, style: HL.red },

  // Exam tips (green)
  { pattern: /(covariate, not mediator|COVARIATE|KEY MEDIATOR|CONFIRMED EXAM|HIGH PRIORITY|peripheral cue|central argument)/g, style: HL.green },
];

function highlightText(text) {
  if (!text || typeof text !== "string") return text;
  const parts = [{ text, style: null }];

  for (const rule of hlRules) {
    for (let i = parts.length - 1; i >= 0; i--) {
      if (parts[i].style !== null) continue; // already styled
      const seg = parts[i].text;
      const splits = [];
      let lastIdx = 0;
      let m;
      const rx = new RegExp(rule.pattern.source, rule.pattern.flags);
      while ((m = rx.exec(seg)) !== null) {
        if (m.index > lastIdx) splits.push({ text: seg.slice(lastIdx, m.index), style: null });
        splits.push({ text: m[0], style: rule.style });
        lastIdx = rx.lastIndex;
      }
      if (splits.length > 0) {
        if (lastIdx < seg.length) splits.push({ text: seg.slice(lastIdx), style: null });
        parts.splice(i, 1, ...splits);
      }
    }
  }

  if (parts.length === 1 && parts[0].style === null) return text;
  return React.createElement(React.Fragment, null,
    ...parts.map((p, i) =>
      p.style ? React.createElement("span", { key: i, style: p.style }, p.text) : p.text
    )
  );
}

function ProgressBar({ completed, total, label }) {
  const pct = Math.round((completed / total) * 100);
  return (
    <div style={{ marginBottom: 20 }}>
      {label && <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 6 }}>{label}</p>}
      <div style={{ background: C.rule, borderRadius: 4, height: 4, overflow: "hidden" }}>
        <div style={{ background: `linear-gradient(90deg, ${C.gold}, ${C.green})`, height: "100%", width: `${pct}%`, borderRadius: 4, transition: "width 0.3s ease" }} />
      </div>
      <p style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>{completed}/{total} ({pct}%)</p>
    </div>
  );
}

function SubTabBar({ tabs, active, onChange }) {
  return (
    <div style={{ display: "flex", gap: 0, marginBottom: 28, borderBottom: `1px solid ${C.rule}` }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{
          background: "transparent",
          color: active === t.id ? C.fg : C.muted,
          border: "none",
          borderBottom: active === t.id ? `2px solid ${C.fg}` : "2px solid transparent",
          padding: "10px 16px",
          fontSize: 13,
          fontWeight: active === t.id ? 600 : 400,
        }}>
          {t.label}
        </button>
      ))}
    </div>
  );
}

function Timer({ timeLeft }) {
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  const isLow = timeLeft < 120;
  return (
    <span style={{
      fontSize: 15,
      fontWeight: 500,
      color: isLow ? C.red : C.fg,
      fontVariantNumeric: "tabular-nums",
      background: C.timerBg,
      padding: "4px 10px",
      borderRadius: 6,
    }}>
      {String(min).padStart(2, "0")}:{String(sec).padStart(2, "0")}
    </span>
  );
}

function DrillCard({ drill, onComplete }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);

  const handleCheck = () => {
    setRevealed(true);
    onComplete(drill.id, selected === drill.correct, drill.title);
  };

  return (
    <div style={{ background: C.white, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "24px", marginBottom: 16 }}>
      <div style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 6 }}>
        CHECK {String(drill.id).padStart(2, "0")}
      </div>
      <h3 style={{ fontSize: 16, fontWeight: 600, color: C.fg, marginBottom: 16 }}>{drill.title}</h3>
      <p style={{ fontSize: 15, color: C.body, lineHeight: 1.75, marginBottom: 20 }}>{drill.scenario}</p>

      {drill.options.map((opt, i) => {
        let bg = C.card, border = C.rule, textColor = C.fg, leftBorder = "3px solid transparent";
        if (revealed && i === drill.correct) { bg = C.correctBg; leftBorder = `3px solid ${C.green}`; }
        else if (revealed && i === selected && i !== drill.correct) { bg = C.incorrectBg; leftBorder = `3px solid ${C.red}`; }
        else if (!revealed && i === selected) { bg = C.hover; border = C.fg; }

        return (
          <button key={i} onClick={() => !revealed && setSelected(i)} style={{
            display: "block", width: "100%", textAlign: "left",
            background: bg, border: `1px solid ${border}`, borderLeft: leftBorder, borderRadius: 8,
            padding: "14px 18px", marginBottom: 8,
            fontSize: 15, color: textColor, lineHeight: 1.75,
            cursor: revealed ? "default" : "pointer",
          }}>
            {opt}
          </button>
        );
      })}

      {!revealed && (
        <button onClick={handleCheck} disabled={selected === null} style={{
          background: selected !== null ? C.fg : C.faint,
          color: C.white, border: "none", borderRadius: 6,
          padding: "10px 24px", fontSize: 13, fontWeight: 500,
          cursor: selected !== null ? "pointer" : "default", marginTop: 8, opacity: selected !== null ? 1 : 0.5,
        }}>
          Check Answer
        </button>
      )}

      {revealed && (
        <div style={{ background: C.card, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "18px 24px", marginTop: 14 }}>
          <span style={{ fontSize: 12, fontWeight: 500, color: C.red, letterSpacing: "0.05em", textTransform: "uppercase" }}>TRAP ALERT</span>
          <p style={{ fontSize: 15, color: C.body, lineHeight: 1.75, marginTop: 6 }}>{highlightText(drill.trap)}</p>
        </div>
      )}
    </div>
  );
}

function DrillTab({ onNavigate, onComplete }) {
  const [version, setVersion] = useState("v1");
  const [currentIdx, setCurrentIdx] = useState(0);
  const [answered, setAnswered] = useState({});
  const [showChains, setShowChains] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const startTime = useRef(Date.now());

  const activeDrills = drillVersions[version];
  const completedCount = Object.keys(answered).length;
  const correctCount = Object.values(answered).filter(Boolean).length;
  const incorrectTitles = activeDrills.filter(d => answered[d.id] === false).map(d => d.title);

  const switchVersion = (v) => {
    setVersion(v);
    setCurrentIdx(0);
    setAnswered({});
    setShowSummary(false);
    startTime.current = Date.now();
  };

  const handleComplete = (id, wasCorrect, drillTitle) => {
    const next = { ...answered, [id]: wasCorrect };
    setAnswered(next);
    if (Object.keys(next).length === 10 && onComplete) {
      const correct = Object.values(next).filter(Boolean).length;
      const wrong = activeDrills.filter(d => next[d.id] === false).map(d => d.title);
      onComplete(correct, 10, wrong, Math.round((Date.now() - startTime.current) / 1000));
    }
  };

  const goNext = () => {
    if (currentIdx < 9) setCurrentIdx(currentIdx + 1);
    else setShowSummary(true);
  };
  const goPrev = () => { if (currentIdx > 0) setCurrentIdx(currentIdx - 1); };

  const versionLabels = [
    { id: "v1", label: "Version 1", desc: "Foundation" },
    { id: "v2", label: "Version 2", desc: "New angles" },
    { id: "v3", label: "Version 3", desc: "Cross-chapter" },
  ];

  const VersionSelector = () => (
    <div style={{ display: "flex", gap: 0, marginBottom: 24, borderBottom: `1px solid ${C.rule}` }}>
      {versionLabels.map(v => (
        <button key={v.id} onClick={() => switchVersion(v.id)} style={{
          background: "none", border: "none",
          borderBottom: version === v.id ? `2px solid ${C.gold}` : "2px solid transparent",
          padding: "10px 16px", fontSize: 14,
          fontWeight: version === v.id ? 600 : 400,
          color: version === v.id ? C.fg : C.muted,
        }}>
          {v.label}
        </button>
      ))}
    </div>
  );

  if (showSummary) {
    return (
      <div style={{ maxWidth: 680, margin: "0 auto", padding: "28px 24px" }}>
        <VersionSelector />
        <div style={{ textAlign: "center", padding: "20px 0" }}>
          <h3 style={{ fontSize: 20, fontWeight: 700, color: C.fg, marginBottom: 8 }}>Concept Check Complete</h3>
          <p style={{ fontSize: 40, fontWeight: 700, color: correctCount >= 8 ? C.green : correctCount >= 5 ? C.gold : C.red, marginBottom: 24 }}>
            {correctCount}/10
          </p>
          {incorrectTitles.length > 0 && (
            <div style={{ textAlign: "left", maxWidth: 480, margin: "0 auto 24px" }}>
              <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 10 }}>WEAK AREAS</p>
              {incorrectTitles.map((t, i) => (
                <p key={i} style={{ fontSize: 15, color: C.red, lineHeight: 1.75, padding: "4px 0" }}>• {t}</p>
              ))}
            </div>
          )}
          <button onClick={() => setShowChains(true)} style={{
            background: C.fg, color: C.white, border: "none", borderRadius: 6,
            padding: "10px 24px", fontSize: 14, fontWeight: 500, marginBottom: 12,
          }}>
            See Cross-Chapter Connections
          </button>
          <br />
          <button onClick={() => { setCurrentIdx(0); setAnswered({}); setShowSummary(false); startTime.current = Date.now(); }} style={{
            background: "none", border: `1px solid ${C.rule}`, borderRadius: 6,
            padding: "10px 24px", fontSize: 14, color: C.muted, marginTop: 8,
          }}>
            Retry All
          </button>
          {showChains && <ChainsModal onClose={() => setShowChains(false)} onNavigate={onNavigate} />}
        </div>
      </div>
    );
  }

  const drill = activeDrills[currentIdx];
  const isAnswered = answered[drill.id] !== undefined;

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "28px 24px" }}>
      <VersionSelector />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ fontSize: 15, fontWeight: 600, color: C.fg }}>{currentIdx + 1}/10</span>
        <button onClick={() => setShowChains(true)} style={{
          background: "none", border: "none", fontSize: 13, color: C.muted, padding: 0,
        }}
          onMouseEnter={(e) => e.currentTarget.style.color = C.fg}
          onMouseLeave={(e) => e.currentTarget.style.color = C.muted}
        >
          Cross-Chapter Connections →
        </button>
      </div>

      <ProgressBar completed={completedCount} total={10} label="PROGRESS" />

      <DrillCard key={`${version}-${drill.id}`} drill={drill} onComplete={handleComplete} />

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
        <button onClick={goPrev} disabled={currentIdx === 0} style={{
          background: "none", border: `1px solid ${C.rule}`, borderRadius: 6,
          padding: "8px 20px", fontSize: 13, color: C.muted,
          cursor: currentIdx > 0 ? "pointer" : "default", opacity: currentIdx > 0 ? 1 : 0.3,
        }}>
          Previous
        </button>
        <button onClick={goNext} disabled={!isAnswered} style={{
          background: isAnswered ? C.fg : C.faint, color: C.white, border: "none", borderRadius: 6,
          padding: "8px 20px", fontSize: 13, fontWeight: 500,
          cursor: isAnswered ? "pointer" : "default", opacity: isAnswered ? 1 : 0.5,
        }}>
          {currentIdx < 9 ? "Next" : "See Results"}
        </button>
      </div>

      {showChains && <ChainsModal onClose={() => setShowChains(false)} onNavigate={onNavigate} />}
    </div>
  );
}

function MCQuiz({ onScoreUpdate }) {
  const [started, setStarted] = useState(false);
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showExplanation, setShowExplanation] = useState(false);
  const [finished, setFinished] = useState(false);
  const [timeLeft, setTimeLeft] = useState(20 * 60);
  const [reviewMode, setReviewMode] = useState(false);
  const mcStartTime = useRef(null);

  const startQuiz = () => {
    const shuffled = [...mcQuestions].sort(() => Math.random() - 0.5).slice(0, 8);
    setQuestions(shuffled);
    setAnswers({});
    setCurrent(0);
    setFinished(false);
    setShowExplanation(false);
    setTimeLeft(20 * 60);
    mcStartTime.current = Date.now();
    setStarted(true);
  };

  useEffect(() => {
    if (!started || finished) return;
    const timer = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) { clearInterval(timer); setFinished(true); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [started, finished]);

  if (!started) {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px" }}>
        <h3 style={{ fontSize: 20, fontWeight: 700, color: C.fg, marginBottom: 12 }}>Multiple Choice Practice</h3>
        <p style={{ fontSize: 14, color: C.muted, marginBottom: 6, lineHeight: 1.7 }}>8 randomly selected questions from a bank of {mcQuestions.length}.</p>
        <p style={{ fontSize: 14, color: C.muted, marginBottom: 28, lineHeight: 1.7 }}>Timer: 20 minutes. Immediate feedback after each answer.</p>
        <button onClick={startQuiz} style={{
          background: C.fg, color: C.white, border: "none", borderRadius: 6,
          padding: "12px 32px", fontSize: 14, fontWeight: 500,
        }}>
          Start Quiz
        </button>
      </div>
    );
  }

  if (finished) {
    const score = questions.reduce((acc, q) => acc + (answers[q.id] === q.correct ? 1 : 0), 0);
    const byChapter = {};
    questions.forEach(q => {
      if (!byChapter[q.chapter]) byChapter[q.chapter] = { correct: 0, total: 0 };
      byChapter[q.chapter].total++;
      if (answers[q.id] === q.correct) byChapter[q.chapter].correct++;
    });
    const mistakes = questions.filter(q => answers[q.id] !== q.correct);

    const elapsed = mcStartTime.current ? Math.round((Date.now() - mcStartTime.current) / 1000) : 0;
    if (onScoreUpdate) onScoreUpdate(score, 8, byChapter, elapsed);

    if (reviewMode && mistakes.length > 0) {
      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
            <h3 style={{ fontSize: 18, fontWeight: 700, color: C.fg }}>Review Mistakes ({mistakes.length})</h3>
            <button onClick={() => setReviewMode(false)} style={{
              background: "none", border: `1px solid ${C.rule}`, borderRadius: 6,
              padding: "6px 16px", fontSize: 13, color: C.muted,
            }}>Back to Score</button>
          </div>
          {mistakes.map((q, idx) => (
            <div key={q.id} style={{ background: C.white, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "24px", marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>{q.chapter}</div>
              <p style={{ fontSize: 15, color: C.fg, lineHeight: 1.75, marginBottom: 16 }}>{q.question}</p>
              {q.options.map((opt, i) => (
                <div key={i} style={{
                  padding: "10px 16px", marginBottom: 6, borderRadius: 8, fontSize: 15, lineHeight: 1.75,
                  background: i === q.correct ? C.correctBg : i === answers[q.id] ? C.incorrectBg : C.card,
                  borderLeft: i === q.correct ? `3px solid ${C.green}` : i === answers[q.id] ? `3px solid ${C.red}` : "3px solid transparent",
                }}>
                  {opt} {i === q.correct && "✓"} {i === answers[q.id] && i !== q.correct && "✗"}
                </div>
              ))}
              <div style={{ background: C.card, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "14px 18px", marginTop: 12 }}>
                <p style={{ fontSize: 14, color: C.body, lineHeight: 1.75 }}>{highlightText(q.explanation)}</p>
              </div>
            </div>
          ))}
        </div>
      );
    }

    return (
      <div style={{ padding: "40px 20px", textAlign: "center" }}>
        <h3 style={{ fontSize: 20, fontWeight: 700, color: C.fg, marginBottom: 8 }}>Quiz Complete</h3>
        <p style={{ fontSize: 40, fontWeight: 700, color: score >= 6 ? C.green : score >= 4 ? C.gold : C.red, marginBottom: 24 }}>{score}/8</p>
        <div style={{ maxWidth: 400, margin: "0 auto", textAlign: "left" }}>
          {Object.entries(byChapter).map(([ch, data]) => (
            <div key={ch} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${C.rule}` }}>
              <span style={{ fontSize: 14, color: C.fg }}>{ch}</span>
              <span style={{ fontSize: 14, fontWeight: 500, color: data.correct === data.total ? C.green : C.red }}>{data.correct}/{data.total}</span>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 28 }}>
          {mistakes.length > 0 && (
            <button onClick={() => setReviewMode(true)} style={{
              background: "none", border: `1px solid ${C.rule}`, borderRadius: 6,
              padding: "10px 24px", fontSize: 13, fontWeight: 500, color: C.fg,
            }}>
              Review Mistakes
            </button>
          )}
          <button onClick={() => { setReviewMode(false); startQuiz(); }} style={{
            background: C.fg, color: C.white, border: "none", borderRadius: 6,
            padding: "10px 24px", fontSize: 13, fontWeight: 500,
          }}>
            Retry
          </button>
        </div>
      </div>
    );
  }

  const q = questions[current];
  const answered = answers[q.id] !== undefined;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <span style={{ fontSize: 13, color: C.muted }}>Q{current + 1} of {questions.length}</span>
        <Timer timeLeft={timeLeft} />
      </div>

      <div style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>{q.chapter}</div>
      <p style={{ fontSize: 15, color: C.fg, lineHeight: 1.8, marginBottom: 24 }}>{q.question}</p>

      {q.options.map((opt, i) => {
        let bg = C.card, border = C.rule, leftBorder = "3px solid transparent";
        if (answered && i === q.correct) { bg = C.correctBg; leftBorder = `3px solid ${C.green}`; }
        else if (answered && i === answers[q.id] && i !== q.correct) { bg = C.incorrectBg; leftBorder = `3px solid ${C.red}`; }

        return (
          <button key={i} onClick={() => {
            if (!answered) {
              setAnswers(prev => ({ ...prev, [q.id]: i }));
              setShowExplanation(true);
            }
          }} style={{
            display: "block", width: "100%", textAlign: "left",
            background: bg, border: `1px solid ${border}`, borderLeft: leftBorder, borderRadius: 8,
            padding: "14px 18px", marginBottom: 8,
            fontSize: 15, color: C.fg, lineHeight: 1.75,
            cursor: answered ? "default" : "pointer",
          }}
            onMouseEnter={(e) => { if (!answered) e.currentTarget.style.background = C.hover; }}
            onMouseLeave={(e) => { if (!answered) e.currentTarget.style.background = C.card; }}
          >
            {opt}
          </button>
        );
      })}

      {answered && (
        <div style={{ background: C.card, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "14px 18px", marginTop: 12, marginBottom: 16 }}>
          <span style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase" }}>EXPLANATION</span>
          <p style={{ fontSize: 15, color: C.body, lineHeight: 1.75, marginTop: 6 }}>{highlightText(q.explanation)}</p>
          {answers[q.id] !== q.correct && (
            <button onClick={() => { setAnswers(prev => { const next = { ...prev }; delete next[q.id]; return next; }); setShowExplanation(false); }} style={{
              background: "none", border: `1px solid ${C.rule}`, borderRadius: 6,
              padding: "6px 16px", fontSize: 13, color: C.muted, marginTop: 10,
            }}>
              Try Again
            </button>
          )}
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
        <button onClick={() => { setCurrent(Math.max(0, current - 1)); setShowExplanation(false); }}
          disabled={current === 0}
          style={{ background: "none", border: `1px solid ${C.rule}`, borderRadius: 6, padding: "8px 20px", fontSize: 13, color: C.muted, cursor: current > 0 ? "pointer" : "default", opacity: current > 0 ? 1 : 0.3 }}>
          Prev
        </button>
        {current < questions.length - 1 ? (
          <button onClick={() => { setCurrent(current + 1); setShowExplanation(false); }}
            style={{ background: C.fg, color: C.white, border: "none", borderRadius: 6, padding: "8px 20px", fontSize: 13, fontWeight: 500 }}>
            Next
          </button>
        ) : (
          <button onClick={() => setFinished(true)}
            style={{ background: C.fg, color: C.white, border: "none", borderRadius: 6, padding: "8px 20px", fontSize: 13, fontWeight: 500 }}>
            Finish
          </button>
        )}
      </div>
    </div>
  );
}

function SAPromptComponent({ onSaSubmit }) {
  const [started, setStarted] = useState(false);
  const [text, setText] = useState("");
  const [timeLeft, setTimeLeft] = useState(8 * 60);
  const [submitted, setSubmitted] = useState(false);
  const [checks, setChecks] = useState(Array(7).fill(false));

  useEffect(() => {
    if (!started || submitted) return;
    const timer = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) { clearInterval(timer); setSubmitted(true); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [started, submitted]);

  if (!started) {
    return (
      <div style={{ textAlign: "center", padding: "60px 20px" }}>
        <h3 style={{ fontSize: 20, fontWeight: 700, color: C.fg, marginBottom: 12 }}>Short Answer Practice</h3>
        <p style={{ fontSize: 14, color: C.muted, marginBottom: 6, lineHeight: 1.7 }}>The Nationwide Question (professor-confirmed exam topic).</p>
        <p style={{ fontSize: 14, color: C.muted, marginBottom: 28, lineHeight: 1.7 }}>Timer: 8 minutes. After submission: model answer + rubric checklist.</p>
        <button onClick={() => setStarted(true)} style={{
          background: C.fg, color: C.white, border: "none", borderRadius: 6,
          padding: "12px 32px", fontSize: 14, fontWeight: 500,
        }}>
          Start SA Practice
        </button>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <span style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase" }}>NATIONWIDE AD — CONFIRMED EXAM QUESTION</span>
        {!submitted && <Timer timeLeft={timeLeft} />}
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "18px 22px", marginBottom: 20 }}>
        <p style={{ fontSize: 15, color: C.fg, lineHeight: 1.8 }}>{saPrompt.prompt}</p>
      </div>

      {!submitted ? (
        <>
          <textarea
            value={text}
            onChange={(e) => setText(e.target.value)}
            placeholder="Write your answer here..."
            style={{
              width: "100%", minHeight: 220, padding: "16px 18px",
              border: `1px solid ${C.rule}`, borderRadius: 8,
              fontSize: 14, lineHeight: 1.8,
              color: C.fg, background: C.white, outline: "none",
            }}
          />
          <button onClick={() => { setSubmitted(true); if (onSaSubmit) onSaSubmit(true, []); }} style={{
            background: C.fg, color: C.white, border: "none", borderRadius: 6,
            padding: "10px 24px", fontSize: 13, fontWeight: 500, marginTop: 12,
          }}>
            Submit Answer
          </button>
        </>
      ) : (
        <>
          {text && (
            <div style={{ marginBottom: 24 }}>
              <h4 style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>YOUR ANSWER</h4>
              <div style={{ background: C.card, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "14px 18px" }}>
                <p style={{ fontSize: 14, color: C.body, lineHeight: 1.75, whiteSpace: "pre-wrap" }}>{text}</p>
              </div>
            </div>
          )}

          <div style={{ marginBottom: 24 }}>
            <h4 style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 12 }}>SELF-SCORE RUBRIC</h4>
            {saPrompt.rubric.map((item, i) => (
              <label key={i} style={{
                display: "flex", alignItems: "flex-start", gap: 10, padding: "8px 0",
                borderBottom: `1px solid ${C.rule}`, cursor: "pointer",
              }}>
                <input type="checkbox" checked={checks[i]} onChange={() => {
                  const next = [...checks];
                  next[i] = !next[i];
                  setChecks(next);
                  if (onSaSubmit) {
                    const checkedItems = saPrompt.rubric.filter((_, j) => next[j]);
                    onSaSubmit(true, checkedItems);
                  }
                }} style={{ marginTop: 3 }} />
                <span style={{ fontSize: 14, color: C.fg, lineHeight: 1.6 }}>{item}</span>
              </label>
            ))}
            <p style={{ fontSize: 13, fontWeight: 500, color: C.fg, marginTop: 10 }}>
              Self-score: {checks.filter(Boolean).length}/{checks.length}
            </p>
          </div>

          {checks.filter(Boolean).length > 0 && (
            <div>
              <h4 style={{ fontSize: 12, fontWeight: 500, color: C.green, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>MODEL ANSWER</h4>
              <div style={{ background: C.card, borderLeft: `3px solid ${C.green}`, borderRadius: 0, padding: "24px" }}>
                <p style={{ fontSize: 15, color: C.body, lineHeight: 1.75, whiteSpace: "pre-wrap" }}>{saPrompt.modelAnswer}</p>
              </div>
            </div>
          )}

          <button onClick={() => { setStarted(false); setText(""); setSubmitted(false); setTimeLeft(8 * 60); setChecks(Array(7).fill(false)); }} style={{
            background: C.fg, color: C.white, border: "none", borderRadius: 6,
            padding: "10px 24px", fontSize: 13, fontWeight: 500, marginTop: 20,
          }}>
            Retry
          </button>
        </>
      )}
    </div>
  );
}

function ScoreDashboard({ drillCompleted, mcScore, mcTotal, mcChapterBreakdown }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.rule}`, borderRadius: 8, padding: "20px 24px", marginBottom: 24 }}>
      <h3 style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 14 }}>SCORE DASHBOARD</h3>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div style={{ background: C.white, borderRadius: 8, padding: "14px 18px", border: `1px solid ${C.rule}` }}>
          <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 6 }}>CONCEPT CHECKS</p>
          <p style={{ fontSize: 24, fontWeight: 700, color: drillCompleted === 10 ? C.green : C.fg }}>{drillCompleted}/10</p>
        </div>
        <div style={{ background: C.white, borderRadius: 8, padding: "14px 18px", border: `1px solid ${C.rule}` }}>
          <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 6 }}>LAST MC SCORE</p>
          <p style={{ fontSize: 24, fontWeight: 700, color: mcScore !== null ? (mcScore >= 6 ? C.green : mcScore >= 4 ? C.gold : C.red) : C.faint }}>
            {mcScore !== null ? `${mcScore}/${mcTotal}` : "—"}
          </p>
        </div>
      </div>
      {mcChapterBreakdown && Object.keys(mcChapterBreakdown).length > 0 && (
        <div style={{ marginTop: 14 }}>
          <p style={{ fontSize: 12, fontWeight: 500, color: C.muted, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>CHAPTER BREAKDOWN</p>
          {Object.entries(mcChapterBreakdown).map(([ch, data]) => {
            const pct = Math.round((data.correct / data.total) * 100);
            return (
              <div key={ch} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                <span style={{ fontSize: 12, color: C.fg, width: 80 }}>{ch}</span>
                <div style={{ flex: 1, background: C.rule, borderRadius: 3, height: 4 }}>
                  <div style={{ background: pct >= 75 ? C.green : pct >= 50 ? C.gold : C.red, height: "100%", width: `${pct}%`, borderRadius: 3 }} />
                </div>
                <span style={{ fontSize: 12, fontWeight: 500, color: C.muted, width: 35, textAlign: "right" }}>{data.correct}/{data.total}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ExamSimTab({ drillCompleted, mcScore, mcTotal, mcChapterBreakdown, onMcScoreUpdate, onSaSubmit }) {
  const [mode, setMode] = useState("mc");

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: "28px 24px" }}>
      <p style={{ fontSize: 15, color: C.muted, marginBottom: 20, lineHeight: 1.75 }}>
        Timed practice: 8 MC questions (20 min) + the Nationwide SA prompt (8 min).
      </p>

      <ScoreDashboard drillCompleted={drillCompleted} mcScore={mcScore} mcTotal={mcTotal} mcChapterBreakdown={mcChapterBreakdown} />

      <SubTabBar
        tabs={[
          { id: "mc", label: "MC Practice" },
          { id: "sa", label: "SA Practice" },
        ]}
        active={mode}
        onChange={setMode}
      />

      {mode === "mc" ? <MCQuiz onScoreUpdate={onMcScoreUpdate} /> : <SAPromptComponent onSaSubmit={onSaSubmit} />}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  FIREBASE ANALYTICS HELPERS
// ═══════════════════════════════════════════════════════════════

const SESSION_ID = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);

async function submitToFirestore(data) {
  try {
    const db = window._db;
    if (!db) return;
    await db.collection("sessions").add({
      sessionId: SESSION_ID,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      ...data,
    });
  } catch (e) {
    console.warn("Firestore submit failed:", e);
  }
}

function App() {
  const [tab, setTab] = useState("home");
  const [studyChapter, setStudyChapter] = useState(null);
  const [studyTopic, setStudyTopic] = useState(null);
  const [drillCompleted, setDrillCompleted] = useState(0);
  const [mcScore, setMcScore] = useState(null);
  const [mcTotal, setMcTotal] = useState(null);
  const [mcChapterBreakdown, setMcChapterBreakdown] = useState(null);
  const sessionStart = useRef(Date.now());

  const handleChainNavigate = (chapterId, topicId) => {
    if (chapterId) {
      setStudyChapter(chapterId);
      setStudyTopic(topicId);
      setTab("study");
    }
  };

  const handleMcScoreUpdate = (score, total, breakdown, timeSpent) => {
    setMcScore(score);
    setMcTotal(total);
    setMcChapterBreakdown(breakdown);
    const incorrectByChapter = {};
    Object.entries(breakdown).forEach(([ch, d]) => {
      if (d.correct < d.total) incorrectByChapter[ch] = d.total - d.correct;
    });
    submitToFirestore({
      mcQuiz: { score, total, incorrectByChapter, timeSpent },
    });
  };

  const handleConceptCheckDone = useCallback((score, total, incorrectPairs, timeSpent) => {
    setDrillCompleted(score);
    submitToFirestore({
      conceptCheck: { score, total, incorrectPairs, timeSpent },
    });
  }, []);

  const handleSaSubmit = useCallback((attempted, rubricChecked) => {
    submitToFirestore({ saAttempted: attempted, saRubricChecked: rubricChecked });
  }, []);

  // Submit total time on unload
  useEffect(() => {
    const handleUnload = () => {
      const totalTime = Math.round((Date.now() - sessionStart.current) / 1000);
      submitToFirestore({ totalTimeOnSite: totalTime });
    };
    window.addEventListener("beforeunload", handleUnload);
    return () => window.removeEventListener("beforeunload", handleUnload);
  }, []);

  return (
    <div style={{ background: C.white, minHeight: "100vh" }}>
      <TabBar active={tab} onChange={setTab} />
      {tab === "home" && <WelcomeBanner onGoTo={setTab} />}
      {tab === "study" && <StudyTab onNavigate={handleChainNavigate} initialChapter={studyChapter} initialTopic={studyTopic} />}
      {tab === "concept" && <DrillTab onNavigate={handleChainNavigate} onComplete={handleConceptCheckDone} />}
      {tab === "exam" && <ExamSimTab drillCompleted={drillCompleted} mcScore={mcScore} mcTotal={mcTotal} mcChapterBreakdown={mcChapterBreakdown} onMcScoreUpdate={handleMcScoreUpdate} onSaSubmit={handleSaSubmit} />}

      <footer style={{ textAlign: "center", padding: "28px 24px", fontSize: 12, color: "#9CA3AF", borderTop: `1px solid ${C.rule}`, marginTop: 40 }}>
        Bella Kang | mk42555 · <a href="https://utexas.instructure.com/courses/1435649" target="_blank" rel="noopener noreferrer" style={{ color: "inherit", textDecoration: "none" }} onMouseOver={e => e.target.style.textDecoration = "underline"} onMouseOut={e => e.target.style.textDecoration = "none"}>ADV 382J</a> Spring 2026
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
